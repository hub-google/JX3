<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JX3 Blog | 管理工具 (靜態代碼生成)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-slate-900">管理工具 (文章代碼生成器)</h1>
            <a href="./" class="text-slate-500 hover:text-slate-900"><i class="fa-solid fa-arrow-left mr-2"></i>返回首頁</a>
        </header>

        <div class="bg-white p-8 rounded-xl shadow-lg border border-slate-200">
            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">文章標題</label>
                <input type="text" id="title" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-amber-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">短網址名 (Slug, 僅限英文與數字)</label>
                <input type="text" id="slug" placeholder="e.g. pvp-report-01" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-amber-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">摘要 (一兩句話)</label>
                <textarea id="summary" rows="2" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-amber-500"></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">文章內文 (支援 HTML)</label>
                <textarea id="content" rows="10" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-amber-500 font-mono text-sm" placeholder="<p>您的文章內容...</p>"></textarea>
            </div>

            <button onclick="generateCode()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-lg hover:bg-amber-600 transition">
                生成 data.js 片段
            </button>
        </div>

        <div id="result-area" class="mt-8 hidden">
            <h2 class="text-xl font-bold mb-4 text-slate-900">生成的代碼 (請複製並貼上到 data.js)：</h2>
            <pre id="output" class="bg-slate-900 text-amber-200 p-6 rounded-lg text-sm overflow-x-auto whitespace-pre-wrap select-all"></pre>
            <p class="text-sm text-slate-500 mt-4 italic">* 複製上面的代碼，貼進 `data.js` 的 `articles` 陣列中即可完成發布。</p>
        </div>
    </div>

    <script>
        function generateCode() {
            const title = document.getElementById('title').value;
            const slug = document.getElementById('slug').value || Date.now();
            const summary = document.getElementById('summary').value;
            const content = document.getElementById('content').value;
            const author = "JX3 觀察員";
            const date = new Date().toISOString().replace('T', ' ').split('.')[0];

            // 1. 生成 Metadata (用於 data.js)
            const metadataObj = {
                id: String(Date.now()),
                slug: slug,
                title: title,
                summary: summary,
                author: author,
                created_at: date,
                is_hidden: 0
            };

            const metadataStr = JSON.stringify(metadataObj, null, 4);
            
            document.getElementById('output').innerText = 
                "// [步驟 1] 將此片段貼入 data.js 的 articles 陣列中：\n" + 
                metadataStr + ",\n\n" +
                "// [步驟 2] 將內容儲存為新檔案：\n" +
                "// 檔案路徑: posts/" + slug + ".html\n" +
                "// 檔案內容如下：\n" +
                "------------------------------------------\n" +
                content;

            document.getElementById('result-area').classList.remove('hidden');
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
